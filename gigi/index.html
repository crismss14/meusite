<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIOVANNA 4 ANOS</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

:root {
  --primary: #FF69B4;
  --primary-dark: #C71585;
  --bg-body: #FFF9FC;
  --white: #ffffff;
  --text-color: #5A5A5A;
  --card-pink: #ffe0f0;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Nunito',sans-serif;
  background-color:var(--bg-body);
  color:var(--text-color);
  overflow-x:hidden;
}

/* VIDEO FUNDO */

.video-background-container{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.hero-video{
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0.9;
}

.video-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:linear-gradient(to bottom, rgba(255,166,201,0.3), var(--bg-body));
}

/* PALCO */

.convite-main{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.convite-stage{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:9/16;
  transform:translateY(-50px);
}

.convite-imagem{
  width:100%;
  height:100%;
  background:url('convite.png') center no-repeat;
  background-size:contain;
  position:absolute;
  top:0;
  left:0;
  border-radius:20px;
}

/* BOTÕES MAPA */

.btn-local,
.btn-lista,
.btn-confirmar,
.btn-filtro{

  position:absolute;
  width:70px;
  height:70px;
  border-radius:50%;
  background:transparent;
  cursor:pointer;
  outline: none;
}

/* POSIÇÕES */

.btn-local{top:71%;left:32%;}
.btn-lista{top:71%;left:52%;}
.btn-confirmar{top:71%;left:12%;}
.btn-filtro{top:71%;left:73%;}

/* CARD SCROLL */

.card-scroll{
  background:#fff;
  text-align:center;
  max-width:320px;
  margin:-110px auto 20px auto;
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  animation:floatCard 1.5s infinite alternate;
}

@keyframes floatCard{
  0%{transform:translateY(0)}
  100%{transform:translateY(-5px)}
}

.seta-animada{
  display:inline-block;
  margin-left:8px;
  animation:bounce 1s infinite;
}

@keyframes bounce{
  0%,20%,50%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(10px)}
  60%{transform:translateY(5px)}
}

/* MURAL */

.card-box{
  background:white;
  border-radius:30px;
  padding:30px;
  margin:25px auto;
  max-width:500px;
  box-shadow:0 10px 25px rgba(255,105,180,0.15);
  text-align:center;
}

.section-title{
  font-family:'Dancing Script',cursive;
  color:var(--primary-dark);
  font-size:1.6rem;
  margin-bottom:8px;
}

.input-recado{
  width:100%;
  padding:15px;
  border:2px solid #eee;
  border-radius:15px;
  margin:10px 0;
  outline: none; /* remove highlight */
  box-shadow: none; /* remove highlight */
}

.btn-jardim{
  width:100%;
  padding:15px;
  background:linear-gradient(45deg,#FF69B4,#C71585);
  color:white;
  border:none;
  border-radius:50px;
  font-size:1.1rem;
  cursor:pointer;
  outline: none; /* remove highlight */
  box-shadow: none; /* remove highlight */
}

.recado-card{
  background:var(--card-pink);
  border-radius:20px;
  padding:15px;
  margin-bottom:15px;
  text-align:left;
  position:relative;
}

.recado-card button{
  position:absolute;
  top:10px;
  right:10px;
  background:#C71585;
  border:none;
  color:white;
  border-radius:50%;
  width:25px;
  height:25px;
  cursor:pointer;
  outline: none; /* remove highlight */
  box-shadow: none; /* remove highlight */
}

/* BOTÃO MUSICA */

#btn-musica{
  position:fixed;
  bottom:30px;
  right:30px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #FF69B4;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:1.5rem;
  cursor:pointer;
  z-index:1000;
  outline: none; /* remove highlight */
  box-shadow: none; /* remove highlight */
}

.footer-jardim{
  text-align:center;
  padding:30px;
  color:#C71585;
  font-weight:bold;
}

/* REMOVE HIGHLIGHT DE TODOS OS ELEMENTOS AO FOCO */
input:focus,
textarea:focus,
button:focus,
a:focus {
  outline: none;
  box-shadow: none;
}

</style>
</head>

<body>

<div class="video-background-container">
<video autoplay muted loop playsinline class="hero-video">
<source src="jardimencantado.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
</div>

<div class="convite-main">
<div class="convite-stage">

<div class="convite-imagem">

<a href="https://maps.app.goo.gl/BCXHNBgK34uYEec66" class="btn-local"></a>

<a href="sugestao.html" class="btn-lista"></a>

<a href="https://wa.me/5548996612459?text=Confirmando presença" class="btn-confirmar"></a>

<a href="https://agapedesignafetivo.com.br/filtrogiovanna/" class="btn-filtro"></a>

</div>
</div>
</div>

<div class="card-scroll">
<h3 class="section-title">
Role para baixo <span class="seta-animada">⬇️</span>
</h3>
</div>

<div id="mural" class="card-box">

<h2 class="section-title">Mural de Recados</h2>

<p style="color:#666;margin-bottom:20px;">
Deixe uma mensagem para Giovanna 🥰
</p>

<form id="form-recado">

<textarea id="msg-recado" class="input-recado" placeholder="Escreva seu recado..." rows="4" required></textarea>

<input id="nome-recado" class="input-recado" placeholder="Seu nome" required>

<button type="submit" class="btn-jardim">Postar Recado</button>

</form>

<div id="lista-recados" style="margin-top:20px;"></div>

</div>

<audio id="musica-fundo" loop autoplay>
<source src="jardim.mp3" type="audio/mpeg">
</audio>

<button id="btn-musica">🎵</button>

<footer class="footer-jardim">
Feito com carinho por Criis Santana 🦋
</footer>

<script>

const formRecado=document.getElementById('form-recado')
const listaRecados=document.getElementById('lista-recados')

const ADMIN_PASSWORD="1323"

function carregarRecados(){

const recados=JSON.parse(localStorage.getItem('recados'))||[]

listaRecados.innerHTML=''

recados.forEach((r,index)=>{

const div=document.createElement('div')

div.className="recado-card"

div.innerHTML=`<strong>${r.nome}:</strong> ${r.msg}`

const btn=document.createElement('button')

btn.innerText="×"

btn.onclick=()=>{

const senha=prompt("Digite a senha para apagar o recado")

if(senha===ADMIN_PASSWORD){

recados.splice(index,1)

localStorage.setItem('recados',JSON.stringify(recados))

carregarRecados()

}else{

alert("Senha incorreta")

}

}

div.appendChild(btn)

listaRecados.appendChild(div)

})

}

function soltarConfetes(){

confetti({

particleCount:120,

spread:70,

origin:{y:0.6}

})

}

formRecado.addEventListener('submit',function(e){

e.preventDefault()

const nome=document.getElementById('nome-recado').value.trim()

const msg=document.getElementById('msg-recado').value.trim()

if(!nome||!msg)return

const recados=JSON.parse(localStorage.getItem('recados'))||[]

recados.push({nome,msg})

localStorage.setItem('recados',JSON.stringify(recados))

carregarRecados()

soltarConfetes()

this.reset()

})

const musica=document.getElementById('musica-fundo')

const btnMusica=document.getElementById('btn-musica')

function toggleMusica(){

if(musica.paused){

musica.play()

btnMusica.innerText="⏸"

}else{

musica.pause()

btnMusica.innerText="🎵"

}

}

btnMusica.addEventListener('click',toggleMusica)

window.addEventListener('load',()=>{

musica.play().catch(()=>{})

})

carregarRecados()
// 1. Bloquear o botão direito do mouse
  document.addEventListener('contextmenu', event => event.preventDefault());

  // 2. Bloquear atalhos de teclado (Ctrl+U, Ctrl+S, F12, etc.)
  document.addEventListener('keydown', function (event) {
    // Tecla 'u' (code 85) + CTRL
    if (event.ctrlKey && event.keyCode === 85) {
      event.preventDefault();
    }
    // Tecla 's' (code 83) + CTRL (evita salvar a página)
    if (event.ctrlKey && event.keyCode === 83) {
      event.preventDefault();
    }
    // Tecla F12 (code 123)
    if (event.keyCode === 123) {
      event.preventDefault();
    }
  });

  
</script>

</body>
</html>
