<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>15 ANOS GIOVANNA ✨</title>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:black;
}

#palco{
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100vw;
  height:100vh;
  max-width:540px;
  max-height:960px;
  background:black;
}

#capa{
  position:absolute;
  inset:0;
  z-index:10;
}

#capa img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#abrirConvite{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  background:transparent;
  border:0;
  margin:0;
  padding:0;
  cursor:pointer;
  outline:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

#videoContainer{
  position:absolute;
  inset:0;
  display:none;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.btn-map{
  position:absolute;
  border-radius:50%;
  width:80px;
  height:80px;
  z-index:15;
  background:transparent;
  border:none;
  outline:none;
  cursor:pointer;
}

#btn1{top:77%; left:44%;}
#btn2{top:77%; left:21%;}
#btn3{top:78%; left:66%;}

#popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:30;
  flex-direction:column;
}

#popup img{
  max-width:100%;
  max-height:83%;
  border-radius:12px;
  border:2px solid white;
  margin-bottom:20px;
}

#closePopup{
  margin-bottom:10px;
  padding:10px 16px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#9660a8;
  color:white;
}

#pixBtn{
  position:absolute;
  width:126px;
  height:62px;
  top:75%;
  z-index:31;
  background:transparent;
  border:none;
}

#pixAviso{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:#9660a8;
  color:white;
  padding:10px 18px;
  border-radius:20px;
  font-size:14px;
  opacity:0;
  transition:opacity .4s;
  z-index:50;
}
</style>
</head>

<body>

<div id="palco">

<div id="capa">
<img src="capa.png">
<button id="abrirConvite"></button>
</div>

<div id="videoContainer">

<video id="video" muted playsinline preload="auto">
<source src="video.mp4" type="video/mp4">
</video>

<a class="btn-map" id="btn1" href="https://maps.app.goo.gl/AoRhWLp8GDK3EoCv5" target="_blank"></a>
<a class="btn-map" id="btn2" href="https://wa.me/5548996612459?text=Quero%20confirmar%20minha%20presen%C3%A7a%20na%20festa%20da%20Giovanna!%20%E2%9C%A8" target="_blank"></a>
<div class="btn-map" id="btn3"></div>

</div>

<audio id="musica" loop preload="auto">
<source src="musica.mp3" type="audio/mpeg">
</audio>

</div>

<div id="popup">
<img src="sugestao.png">
<button id="closePopup">X Fechar</button>
<button id="pixBtn"></button>
</div>

<div id="pixAviso">Chave PIX copiada ✅</div>

<script>

const capa = document.getElementById("capa")
const videoContainer = document.getElementById("videoContainer")
const video = document.getElementById("video")
const musica = document.getElementById("musica")

const btn3 = document.getElementById("btn3")
const popup = document.getElementById("popup")
const closePopup = document.getElementById("closePopup")
const pixBtn = document.getElementById("pixBtn")
const pixAviso = document.getElementById("pixAviso")

const area = document.getElementById("abrirConvite")

const chavePix = "48996612459"

let conviteAberto = false
let audioLiberado = false

/* DESBLOQUEAR AUDIO NO PRIMEIRO TOQUE */

function desbloquearAudio(){

if(audioLiberado) return

musica.muted = true
musica.volume = 0

const p = musica.play()

if(p !== undefined){

p.then(()=>{

musica.pause()
musica.currentTime = 0
musica.muted = false
musica.volume = 0.4

audioLiberado = true

}).catch(()=>{})

}

}

document.addEventListener("touchstart",desbloquearAudio,{once:true})
document.addEventListener("pointerdown",desbloquearAudio,{once:true})
document.addEventListener("mousedown",desbloquearAudio,{once:true})

/* INICIAR VIDEO */

function iniciarVideoEMusica(){

videoContainer.style.display="block"
capa.style.display="none"

video.setAttribute("playsinline","")
video.setAttribute("webkit-playsinline","")

video.muted=true
video.play().catch(()=>{})

}

/* ABRIR CONVITE */

function abrirConvite(){

if(conviteAberto) return

conviteAberto=true

iniciarVideoEMusica()

}

/* SISTEMA DE ESFREGAR */

const SCRUBTHRESHOLD = 30

let armed = false
let lastPointerX = null
let lastPointerY = null
let totalDistance = 0

const arm = async () => {

if(armed) return

armed = true

if(audioLiberado){

musica.currentTime = 0
musica.volume = 0.4
musica.play().catch(()=>{})

}

abrirConvite()

}

area.addEventListener("pointerdown",(e)=>{

e.preventDefault()

lastPointerX = e.clientX
lastPointerY = e.clientY

totalDistance = 0

})

area.addEventListener("pointermove",(e)=>{

if(armed || lastPointerX === null) return

const dx = e.clientX - lastPointerX
const dy = e.clientY - lastPointerY

const distance = Math.sqrt(dx*dx + dy*dy)

totalDistance += distance

lastPointerX = e.clientX
lastPointerY = e.clientY

if(totalDistance >= SCRUBTHRESHOLD){

arm()

}

})

area.addEventListener("pointerup",()=>{

lastPointerX = null
lastPointerY = null
totalDistance = 0

})

/* POPUP */

btn3.addEventListener("click",()=>{

popup.style.display="flex"

})

closePopup.addEventListener("click",()=>{

popup.style.display="none"

})

pixBtn.addEventListener("click",()=>{

navigator.clipboard.writeText(chavePix).then(()=>{

pixAviso.style.opacity="1"

setTimeout(()=>{

pixAviso.style.opacity="0"

},2000)

})

})

  // Bloquear botão direito
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Bloquear atalhos de teclado (Ctrl+U, Ctrl+S, F12)
    document.addEventListener('keydown', function (event) {
        if (event.ctrlKey && event.keyCode === 85) { event.preventDefault(); }
        if (event.ctrlKey && event.keyCode === 83) { event.preventDefault(); }
        if (event.keyCode === 123) { event.preventDefault(); }
    });

</script>

</body>
</html>
