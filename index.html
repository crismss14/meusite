<script>
// ===== SISTEMA DE BRILHOS ANIMADOS =====

const canvas = document.getElementById('brilhosCanvas');
const ctx = canvas.getContext('2d');
const brilhoImg = document.getElementById('brilhoImg');

function ajustarCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

ajustarCanvas();
window.addEventListener('resize', ajustarCanvas);

let brilhos = [];
const MAX_BRILHOS = 12;

function criarBrilho() {
  brilhos.push({
    x: Math.random() * 100,
    y: Math.random() * 100,
    size: Math.random() * 25 + 15,
    opacity: Math.random() * 0.6 + 0.4,
    dx: (Math.random() - 0.5) * 0.2,
    dy: (Math.random() - 0.5) * 0.2,
    dOpacity: (Math.random() - 0.5) * 0.015
  });

  if (brilhos.length > MAX_BRILHOS) brilhos.shift();
}

function animarBrilhos() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  brilhos.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
    b.opacity += b.dOpacity;

    // Mantém opacidade entre 0 e 1
    if (b.opacity <= 0.2 || b.opacity >= 1) {
      b.dOpacity *= -1;
    }

    const x = (b.x / 100) * canvas.width;
    const y = (b.y / 100) * canvas.height;

    ctx.save();
    ctx.globalAlpha = b.opacity;
    ctx.drawImage(brilhoImg, x - b.size/2, y - b.size/2, b.size, b.size);
    ctx.restore();
  });

  requestAnimationFrame(animarBrilhos);
}

for (let i = 0; i < MAX_BRILHOS; i++) criarBrilho();
brilhoImg.onload = animarBrilhos;


// ===== BLOQUEIOS BÁSICOS =====

// Bloquear botão direito
document.addEventListener('contextmenu', e => e.preventDefault());

// Bloquear atalhos comuns
document.addEventListener('keydown', e => {
  if (e.ctrlKey && ['u','s','U','S'].includes(e.key)) e.preventDefault();
  if (e.key === 'F12') e.preventDefault();
});
</script>
