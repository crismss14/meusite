:20px;opacity:0;animation:fadeLoop 20s infinite}.galeria-container img:nth-child(1){animation-delay:0s}.galeria-container img:nth-child(2){animation-delay:5s}.galeria-container img:nth-child(3){animation-delay:10s}.galeria-container img:nth-child(4){animation-delay:15s}@keyframes fadeLoop{0%{opacity:0}5%{opacity:1}25%{opacity:1}30%{opacity:0}100%{opacity:0}}#brilhosCanvas{position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:10}</style></head><body><!-- Canvas onde os brilhos são desenhados --><canvas id="brilhosCanvas"></canvas><!-- brilho.png → AQUI VAI A IMAGEM DO BRILHO (estrelinha transparente em PNG) --> <img id="brilhoImg" src="brilho.png" style="display:none"><header><!-- logo.png → AQUI VAI SUA LOGO --> <img src="logo.png" alt="SUA LOGO AQUI"><h1>Ágape Design Afetivo</h1><p>Convites digitais e retrospectivas personalizadas ✨</p><!-- LINK DO SEU WHATSAPP (troque o número se quiser) --> <a class="btn" href="https://wa.me/5548996612459" target="_blank">📱 Falar comigo no WhatsApp</a></header><section><h2>Nossos Serviços💕</h2><p>🎬 RETROSPECTIVAS ANIMADAS<br>🎉 CONVITES ANIMADOS<br>📱 CONVITES INTERATIVOS E TRADICIONAIS</p></section><section class="fade-galeria"><div class="galeria-container"><!-- foto1.jpg → COLOQUE A FOTO DO SEU PRIMEIRO CONVITE --> <img src="foto1.jpg" alt="Convite 1"><!-- foto2.jpg → SEGUNDO CONVITE --> <img src="foto2.jpg" alt="Convite 2"><!-- foto3.jpg → TERCEIRO CONVITE --> <img src="foto3.jpg" alt="Convite 3"><!-- foto4.jpg → QUARTO CONVITE --> <img src="foto4.jpg" alt="Convite 4"></div></section><script>// ===== SISTEMA DE BRILHOS ANIMADOS =====

const canvas = document.getElementById('brilhosCanvas');
const ctx = canvas.getContext('2d');
const brilhoImg = document.getElementById('brilhoImg');

// Define tamanho do canvas igual à tela
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let brilhos = [];
const MAX_BRILHOS = 12; // Quantidade máxima de brilhos

// Cria um novo brilho
function criarBrilho() {
  brilhos.push({
    x: Math.random() * 100,
    y: Math.random() * 100,
    size: Math.random() * 25 + 15,
    opacity: Math.random() * 0.6 + 0.4,
    dx: (Math.random() - 0.5) * 0.2,
    dy: (Math.random() - 0.5) * 0.2,
    dOpacity: (Math.random() - 0.5) * 0.015
  });

  if (brilhos.length > MAX_BRILHOS) brilhos.shift();
}

// Função que anima os brilhos
function animarBrilhos() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  brilhos.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
    b.opacity += b.dOpacity;

    const x = (b.x / 100) * canvas.width;
    const y = (b.y / 100) * canvas.height;

    ctx.save();
    ctx.globalAlpha = b.opacity;
    ctx.drawImage(brilhoImg, x - b.size/2, y - b.size/2, b.size, b.size);
    ctx.restore();
  });

  requestAnimationFrame(animarBrilhos);
}

// Inicia os brilhos
for (let i = 0; i < MAX_BRILHOS; i++) criarBrilho();
brilhoImg.onload = animarBrilhos;

// 1. Bloquear o botão direito do mouse document.addEventListener('contextmenu', event => event.preventDefault()); // 2. Bloquear atalhos de teclado (Ctrl+U, Ctrl+S, F12, etc.) document.addEventListener('keydown', function (event) { // Tecla 'u' (code 85) + CTRL if (event.ctrlKey && event.keyCode === 85) { event.preventDefault(); } // Tecla 's' (code 83) + CTRL (evita salvar a página) if (event.ctrlKey && event.keyCode === 83) { event.preventDefault(); } // Tecla F12 (code 123) if (event.keyCode === 123) { event.preventDefault(); }
    
  });</script><footer>© 2026 • ÁGAPE DESIGN AFETIVO • Feito com amor 💖</footer></body></html>
